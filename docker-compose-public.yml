name: chill-public
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: always
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/intro-skipper/intro-skipper-docker-mod
    volumes:
      - ${BASE}/jellyfin/config:/config
      - ${DOWNLOADS}:/data
      - ${BASE}/jellyfin/web-config.json:/usr/share/jellyfin/web/config.json
    ports:
      - "0.0.0.0:8003:8096"
    networks:
      net-chill:
        ipv4_address: 10.10.66.103

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    restart: always
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
    volumes:
      - ${BASE}/seerr/config:/app/config
    ports:
      - "0.0.0.0:8004:5055"
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    networks:
      net-chill:
        ipv4_address: 10.10.66.104
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

# docker network create --driver bridge --subnet 10.10.66.0/24 net-chill
networks:
  net-chill:
    external: true
