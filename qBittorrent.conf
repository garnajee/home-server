[Application]
FileLogger\Age=3
FileLogger\AgeType=1
FileLogger\Backup=true
FileLogger\DeleteOld=true
FileLogger\Enabled=true
FileLogger\MaxSizeBytes=66560
FileLogger\Path=/config/qBittorrent/logs

[AutoRun]
enabled=false
program=

[BitTorrent]
Session\AddTorrentStopped=false
Session\AlternativeGlobalDLSpeedLimit=1000000
Session\AlternativeGlobalUPSpeedLimit=100
Session\AnonymousModeEnabled=false
Session\BandwidthSchedulerEnabled=true
Session\DHTEnabled=false
Session\DefaultSavePath=/data/completed
Session\Encryption=0
Session\ExcludedFileNames=
Session\GlobalDLSpeedLimit=0
Session\GlobalUPSpeedLimit=0
Session\Interface=
Session\InterfaceName=
Session\LSDEnabled=false
Session\MaxActiveDownloads=7
Session\MaxActiveTorrents=2000
Session\MaxActiveUploads=2000
Session\PeXEnabled=false
Session\Port=34566
Session\QueueingSystemEnabled=true
Session\SSL\Port=56659
Session\ShareLimitAction=Stop
Session\Tags=cross-seed
Session\TempPath=/data/incomplete
